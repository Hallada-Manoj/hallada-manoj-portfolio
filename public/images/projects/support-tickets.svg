<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" rx="16" fill="#020617"/>
  <rect width="1200" height="675" rx="16" fill="url(#ticketGrad)" fill-opacity="0.5"/>
  <defs>
    <linearGradient id="ticketGrad" x1="0" y1="0" x2="1200" y2="675">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.06"/>

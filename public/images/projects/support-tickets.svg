  <text x="225" y="248" fill="#F1F5F9" font-size="13" font-family="sans-serif" font-weight="600">Incorrect charge on invoice</text>
  <text x="225" y="268" fill="#64748B" font-size="11" font-family="sans-serif">John D. • Priority: High</text>
  <rect x="365" y="240" width="55" height="22" rx="11" fill="#38BDF8" opacity="0.12"/>

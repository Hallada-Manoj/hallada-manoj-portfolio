  <text x="225" y="353" fill="#F1F5F9" font-size="13" font-family="sans-serif" font-weight="600">App crashes on login screen</text>
  <text x="225" y="373" fill="#64748B" font-size="11" font-family="sans-serif">Sarah M. • Priority: Urgent</text>
  <rect x="365" y="345" width="70" height="22" rx="11" fill="#EF4444" opacity="0.12"/>

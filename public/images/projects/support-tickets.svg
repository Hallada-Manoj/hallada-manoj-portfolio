  <rect x="160" y="430" width="400" height="90" rx="10" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
  <rect x="160" y="430" width="4" height="90" rx="2" fill="#22C55E"/>
  <circle cx="195" cy="460" r="14" fill="#22C55E" opacity="0.15"/>

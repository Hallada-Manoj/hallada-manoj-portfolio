  <text x="180" y="298" fill="#475569" font-size="10" font-family="monospace">#TKT-0042 • 2h ago</text>
  <!-- Ticket 2 - Technical -->
  <rect x="160" y="325" width="400" height="90" rx="10" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
  <rect x="160" y="325" width="4" height="90" rx="2" fill="#6366F1"/>
  <circle cx="195" cy="355" r="14" fill="#6366F1" opacity="0.15"/>

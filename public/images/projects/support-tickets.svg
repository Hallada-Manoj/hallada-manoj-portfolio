  <rect x="610" y="380" width="380" height="70" rx="10" fill="#38BDF8" opacity="0.04" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.1"/>
  <text x="800" y="408" fill="#38BDF8" font-size="12" font-family="sans-serif" text-anchor="middle" font-weight="600">&#9889; AI Auto-Classification Active</text>
  <text x="800" y="430" fill="#64748B" font-size="10" font-family="sans-serif" text-anchor="middle">Automatically categorizing incoming tickets</text>
